<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>島灰 DaoHuei 🐶</title>
 
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=DM+Sans:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
 
<style>
*{margin:0;padding:0;box-sizing:border-box;}
 
:root{
  --cream:#f7f2eb;
  --warm:#e8ddd0;
  --sand:#c9b99a;
  --brown:#6b4c2a;
  --dark:#1e1208;
  --accent:#4a7c59;
  --accent2:#7db88a;
}
 
body{
  background:var(--cream);
  font-family:'DM Sans','Noto Sans JP',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}
 
/* ─── 語言列 ─── */
.lang-bar{
  position:fixed;
  top:14px;
  right:14px;
  display:flex;
  gap:6px;
  z-index:100;
}
.lang-btn{
  padding:6px 12px;
  border-radius:99px;
  border:none;
  background:rgba(0,0,0,0.35);
  color:#fff;
  cursor:pointer;
  font-size:0.8rem;
  backdrop-filter:blur(6px);
  transition:background 0.2s,color 0.2s;
}
.lang-btn.active{
  background:#fff;
  color:var(--accent);
  font-weight:600;
}
 
/* ─── HERO ─── */
.hero{
  width:100%;
  text-align:center;
  padding:64px 20px 96px;
  background:linear-gradient(160deg,#1a2e20,#2d5c3e,#4a7c59,#7db88a);
  color:#fff;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:"🐾";
  position:absolute;
  font-size:160px;
  opacity:0.06;
  left:-20px;
  bottom:-30px;
  transform:rotate(-15deg);
}
.hero::after{
  content:"🐾";
  position:absolute;
  font-size:110px;
  opacity:0.05;
  right:-10px;
  top:-10px;
  transform:rotate(20deg);
}
 
.avatar-ring{
  width:124px;
  height:124px;
  border-radius:50%;
  overflow:hidden;
  margin:auto;
  border:4px solid rgba(255,255,255,0.45);
  box-shadow:0 12px 36px rgba(0,0,0,0.3);
  animation:pop 0.55s cubic-bezier(0.34,1.56,0.64,1);
}
.avatar-ring img{
  width:100%;
  height:100%;
  object-fit:cover;
}
@keyframes pop{
  from{transform:scale(0.6);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
 
.hero-name{
  font-family:'Playfair Display',serif;
  font-size:2.4rem;
  margin-top:12px;
  letter-spacing:0.02em;
}
.hero-sub{
  font-size:0.85rem;
  opacity:0.7;
  margin-top:4px;
  letter-spacing:0.08em;
  text-transform:uppercase;
}
 
/* ─── 卡片區 ─── */
.card-wrap{
  max-width:420px;
  width:100%;
  margin-top:-52px;
  padding:0 16px 40px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
 
/* ─── 基礎卡片 ─── */
.card{
  background:#fff;
  padding:20px;
  border-radius:18px;
  box-shadow:0 4px 18px rgba(0,0,0,0.07);
}
 
/* ─── 警告 ─── */
.warning{
  background:#f0f7f2;
  color:#2d5c3e;
  border:1.5px solid #b0d9bc;
  font-weight:600;
  font-size:0.92rem;
  line-height:1.6;
}
 
/* ─── 資訊格 ─── */
.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.info-item{
  background:var(--cream);
  border-radius:12px;
  padding:14px;
}
.info-label{
  font-size:0.7rem;
  color:var(--sand);
  letter-spacing:0.06em;
  text-transform:uppercase;
  margin-bottom:4px;
}
.info-value{
  font-size:0.95rem;
  color:var(--dark);
  font-weight:500;
  line-height:1.4;
}
 
/* ─── 個性卡（全寬） ─── */
.personality-card{
  background:var(--cream);
  border-radius:12px;
  padding:14px;
  margin-top:10px;
}
 
/* ─── 按鈕 ─── */
.btn{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  padding:16px;
  border-radius:14px;
  text-decoration:none;
  font-weight:500;
  font-size:1rem;
  transition:opacity 0.15s,transform 0.15s;
}
.btn:active{
  opacity:0.85;
  transform:scale(0.98);
}
.btn-primary{
  background:var(--accent);
  color:#fff;
}
.btn-outline{
  border:2px solid #ddd;
  color:#333;
  background:#fff;
}
 
/* ─── GPS 卡 ─── */
.gps-card{
  background:linear-gradient(135deg,#1a2e20,#2d5c3e);
  color:#fff;
  padding:20px;
  border-radius:18px;
}
.gps-desc{
  font-size:0.88rem;
  opacity:0.8;
  margin-bottom:12px;
}
.btn-gps{
  background:rgba(255,255,255,0.15);
  color:#fff;
  border:1.5px solid rgba(255,255,255,0.3);
  width:100%;
  backdrop-filter:blur(4px);
}
 
/* ─── 淡入 ─── */
.fade{animation:fadeIn 0.3s ease;}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>
 
<!-- 語言 -->
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('zh',this)">中</button>
  <button class="lang-btn" onclick="setLang('en',this)">EN</button>
  <button class="lang-btn" onclick="setLang('ja',this)">日</button>
</div>
 
<!-- HERO -->
<div class="hero">
  <div class="avatar-ring">
    <img src="https://github.com/godivanlife-creator/DaoHuei/blob/main/DSC_6627%20-%20Yu%20Qiao.jpeg?raw=true" alt="島灰">
  </div>
  <div class="hero-name" id="t-name">島灰 DaoHuei</div>
  <div class="hero-sub" id="t-sub">GodiVanLife Pet Tag</div>
</div>
 
<!-- 卡片 -->
<div class="card-wrap" id="wrap">
 
  <!-- 警告 -->
  <div class="card warning" id="t-warning"></div>
 
  <!-- 基本資訊 -->
  <div class="card">
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label" id="t-breed-label"></div>
        <div class="info-value" id="t-breed"></div>
      </div>
      <div class="info-item">
        <div class="info-label" id="t-trait-label"></div>
        <div class="info-value" id="t-trait"></div>
      </div>
    </div>
    <div class="personality-card">
      <div class="info-label" id="t-personality-label"></div>
      <div class="info-value" id="t-personality"></div>
    </div>
  </div>
 
  <!-- 電話 -->
  <a class="btn btn-primary" href="tel:0937705011" id="t-call"></a>
 
  <!-- GPS -->
  <div class="gps-card">
    <p class="gps-desc" id="t-gps-desc"></p>
    <button class="btn btn-gps" id="gps-btn" onclick="sendGPS()"></button>
  </div>
 
  <!-- IG -->
  <a class="btn btn-outline" href="https://www.instagram.com/daohueiii_ma?igsh=MWcyMmZoa2ljbG0yMA==" target="_blank" id="t-ig"></a>
 
</div>
 
<script>
const i18n={
  zh:{
    warning:"⚠️ 個性偏膽小，請勿大聲驚嚇或強行接近",
    breedLabel:"🐶 品種",
    breed:"米克斯",
    traitLabel:"✨ 特點",
    trait:"乖巧穩定 · 不吠叫 · 不咬人",
    personalityLabel:"🍖 關於島灰",
    personality:"長得超可愛 🐾 不攻擊狗 · 膽小遇到不喜歡的人事物會自己避開 · 最喜歡吃肉肉",
    call:"📞 聯絡主人",
    gpsDesc:"如果發現島灰走失，請點擊下方按鈕回報位置給主人",
    gpsBtn:"📍 回報位置",
    gpsLoading:"定位中...",
    gpsError:"定位失敗，請重試",
    ig:"📸 追蹤島灰的 IG"
  },
  en:{
    warning:"⚠️ Easily frightened — please approach gently and quietly",
    breedLabel:"🐶 Breed",
    breed:"Mixed",
    traitLabel:"✨ Traits",
    trait:"Gentle · No barking · No biting",
    personalityLabel:"🍖 About DaoHuei",
    personality:"Super cute 🐾 Not aggressive with dogs · Shy by nature, avoids things she dislikes · Loves meat treats",
    call:"📞 Call Owner",
    gpsDesc:"If you found DaoHuei, please send your location to the owner",
    gpsBtn:"📍 Send Location",
    gpsLoading:"Getting location...",
    gpsError:"Location failed, please retry",
    ig:"📸 Follow on Instagram"
  },
  ja:{
    warning:"⚠️ 怖がりな子です。急な動作や大きな声はご遠慮ください",
    breedLabel:"🐶 種類",
    breed:"ミックス犬",
    traitLabel:"✨ 特徴",
    trait:"おとなしい · 吠えない · 噛まない",
    personalityLabel:"🍖 島灰について",
    personality:"とっても可愛い 🐾 犬に攻撃しない · 怖がりで嫌なものは自分で避ける · お肉が大好き",
    call:"📞 飼い主に電話",
    gpsDesc:"島灰を見つけたら、位置情報を飼い主に送ってください",
    gpsBtn:"📍 位置を送る",
    gpsLoading:"取得中...",
    gpsError:"失敗しました",
    ig:"📸 インスタグラムを見る"
  }
};
 
let lang='zh';
 
function applyLang(){
  const t=i18n[lang];
  document.getElementById("t-warning").innerText=t.warning;
  document.getElementById("t-breed-label").innerText=t.breedLabel;
  document.getElementById("t-breed").innerText=t.breed;
  document.getElementById("t-trait-label").innerText=t.traitLabel;
  document.getElementById("t-trait").innerText=t.trait;
  document.getElementById("t-personality-label").innerText=t.personalityLabel;
  document.getElementById("t-personality").innerText=t.personality;
  document.getElementById("t-call").innerText=t.call;
  document.getElementById("t-gps-desc").innerText=t.gpsDesc;
  document.getElementById("gps-btn").innerText=t.gpsBtn;
  document.getElementById("t-ig").innerText=t.ig;
}
 
function setLang(l,el){
  lang=l;
  applyLang();
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const wrap=document.getElementById("wrap");
  wrap.classList.remove("fade");
  void wrap.offsetWidth;
  wrap.classList.add("fade");
}
 
applyLang();
 
function sendGPS(){
  const btn=document.getElementById("gps-btn");
  const t=i18n[lang];
  btn.innerText=t.gpsLoading;
  btn.disabled=true;
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude.toFixed(6);
    const lng=pos.coords.longitude.toFixed(6);
    const url=`https://maps.google.com/?q=${lat},${lng}`;
    const msg=encodeURIComponent("🐶 發現島灰："+url);
    window.location.href=`sms:0937705011?body=${msg}`;
    resetGPS();
  },()=>{
    alert(t.gpsError);
    resetGPS();
  });
}
 
function resetGPS(){
  const btn=document.getElementById("gps-btn");
  btn.disabled=false;
  btn.innerText=i18n[lang].gpsBtn;
}
</script>
</body>
</html>
