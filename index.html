<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DaoHuei | GodiVanLife Pet Tag</title>

<style>

:root{
--main:#6c9a8b;
--bg:#f6f9f8;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,
'PingFang TC','Microsoft JhengHei',sans-serif;
background:var(--bg);
margin:0;
display:flex;
justify-content:center;
min-height:100vh;
}

.app{
width:100%;
max-width:420px;
padding:25px;
text-align:center;
}

.avatar{
width:190px;
height:190px;
border-radius:50%;
border:6px solid white;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
object-fit:cover;
}

h1{
margin-top:15px;
font-weight:600;
}

.card{
background:white;
border-radius:20px;
padding:22px;
text-align:left;
margin:20px 0;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
line-height:1.7;
font-size:15px;
}

.btn{
display:block;
width:100%;
padding:16px;
border-radius:40px;
font-size:17px;
font-weight:600;
border:none;
cursor:pointer;
margin-top:12px;
color:white;
text-decoration:none;
}

.btn-location{
background:#007aff;
}

.btn-family{
background:#2ed573;
}

.btn-ig{
background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);
}

.lang{
margin-bottom:10px;
}

.lang button{
padding:6px 12px;
border:none;
border-radius:20px;
margin:3px;
cursor:pointer;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.footer{
margin-top:25px;
font-size:12px;
color:#999;
}

</style>
</head>

<body>

<div class="app">

<div class="lang">
<button onclick="setLang('zh')">中文</button>
<button onclick="setLang('ja')">日本語</button>
<button onclick="setLang('en')">English</button>
</div>

<img src="https://raw.githubusercontent.com/godivanlife-creator/DaoHuei/main/DSC_6627%20-%20Yu%20Qiao.jpeg"
class="avatar"
alt="DaoHuei">

<h1>DaoHuei（島灰）</h1>

<div class="card" id="info"></div>

<button class="btn btn-location" onclick="shareLocation()" id="locBtn"></button>

<a href="tel:0937705011" class="btn btn-family" id="familyBtn"></a>

<a href="https://www.instagram.com/daohueiii_ma/" target="_blank" class="btn btn-ig" id="igBtn"></a>

<div class="footer">
GodiVanLife Pet Tag
</div>

</div>

<script>

const text={

zh:{
info:"🐶 乖巧穩定、長得可愛<br><br>🐾 不會吠叫、不會咬人、不會攻擊狗<br><br>😳 個性偏膽小，不喜歡的人事物會自己避開<br><br>🍖 最喜歡吃肉肉",
loc:"📍 回報目前位置",
family:"📞 通知家人",
ig:"📸 Instagram 回報"
},

ja:{
info:"🐶 とてもおとなしくて可愛い犬です<br><br>🐾 吠えない・噛まない・他の犬に攻撃しません<br><br>😳 少し臆病で、苦手な人や物からは自分で離れます<br><br>🍖 お肉が大好きです",
loc:"📍 現在地を送る",
family:"📞 家族に知らせる",
ig:"📸 Instagramで連絡"
},

en:{
info:"🐶 Very calm and cute dog<br><br>🐾 Does not bark, bite, or attack other dogs<br><br>😳 A little shy. Will walk away from things she doesn't like<br><br>🍖 Loves meat very much",
loc:"📍 Share my location",
family:"📞 Notify my family",
ig:"📸 Contact via Instagram"
}

};

function setLang(lang){

document.getElementById("info").innerHTML=text[lang].info;
document.getElementById("locBtn").innerText=text[lang].loc;
document.getElementById("familyBtn").innerText=text[lang].family;
document.getElementById("igBtn").innerText=text[lang].ig;

}

setLang("zh");

function shareLocation(){

if(!navigator.geolocation){
alert("Location unavailable");
return;
}

navigator.geolocation.getCurrentPosition((pos)=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

const map=`https://www.google.com/maps?q=${lat},${lng}`;

navigator.clipboard.writeText(map);

alert("Location copied. Please send via Instagram.");

});

}

</script>

</body>
</html>
